
<div class="auth" id="auth-component">

  <div
    class="auth-loading"
    id="auth-loading"
  >
    Loading...
  </div>

  <div
    class="auth-guest"
    id="auth-guest"
    hidden
  >
    <button
      class="auth-button"
      id="auth-login-btn"
      type="button"
    >
      Sign In
    </button>
  </div>

  <div
    class="auth-user"
    id="auth-user"
    hidden
  >

    <div
      class="auth-avatar"
      id="auth-avatar"
    >
      U
    </div>

    <div class="auth-info">

      <div
        class="auth-name"
        id="auth-name"
      >
        User
      </div>

      <div
        class="auth-email"
        id="auth-email"
      >
        user@example.com
      </div>

    </div>

    <div class="auth-menu">

      <a
        href="/profile"
        class="auth-link"
      >
        Profile
      </a>

      <a
        href="/wallet"
        class="auth-link"
      >
        Wallet
      </a>

      <button
        class="auth-logout"
        id="auth-logout-btn"
        type="button"
      >
        Logout
      </button>

    </div>

  </div>

</div>
